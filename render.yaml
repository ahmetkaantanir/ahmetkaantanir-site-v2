services:
  - type: web
    name: log-intelligence-lab
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_DEBUG
        value: false
    healthCheckPath: /api/health
